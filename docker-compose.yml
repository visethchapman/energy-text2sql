services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: energy-postgres
    environment:
      POSTGRES_USER: energy
      POSTGRES_PASSWORD: energy_dev
      POSTGRES_DB: energy
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U energy -d energy"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  postgres_data:
