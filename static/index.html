<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Energy Text-to-SQL</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@picocss/pico@2/css/pico.min.css">
  <style>
    body { padding: 2rem 0; }
    pre { white-space: pre-wrap; word-break: break-word; max-height: 320px; overflow: auto; font-size: 0.85em; }
    table { font-size: 0.9em; }
    .muted { color: var(--pico-muted-color); font-size: 0.85em; }
    .err   { color: var(--pico-color-red-500); }
    .row   { display: flex; gap: 1rem; align-items: baseline; flex-wrap: wrap; }
    [hidden] { display: none !important; }
    h3 { margin-top: 1.5rem; margin-bottom: 0.5rem; }
    .examples button { padding: 0.25rem 0.75rem; font-size: 0.85em; margin: 0.2rem 0.2rem 0.2rem 0; }
  </style>
</head>
<body>
  <main class="container">
    <hgroup>
      <h1>Energy Text-to-SQL</h1>
      <p>Ask plain-English questions about US electricity grid + Houston weather.</p>
    </hgroup>

    <form id="ask-form">
      <input type="text" id="question" name="question"
             placeholder="e.g. What was peak ERCOT demand in 2024?" required autocomplete="off">
      <button type="submit" id="submit-btn">Ask</button>
    </form>

    <details>
      <summary>Example questions</summary>
      <div class="examples">
        <button type="button" data-q="What was the peak hourly ERCOT demand in 2024?">peak demand 2024</button>
        <button type="button" data-q="Total annual ERCOT demand for each year.">annual totals</button>
        <button type="button" data-q="Compare ERCOT average hourly demand on weekdays vs weekends in 2024.">weekday vs weekend</button>
        <button type="button" data-q="During the February 2021 Texas freeze (Feb 13-19, 2021), what was each day's Houston minimum temperature and average daily ERCOT demand?">feb 2021 freeze</button>
        <button type="button" data-q="Correlation between Houston daily max temperature and average daily ERCOT demand across 2024.">temp/demand correlation</button>
      </div>
    </details>

    <article id="status" hidden aria-busy="true"><span id="status-text">Starting…</span></article>

    <article id="response" hidden>
      <details open><summary><strong>Plan</strong></summary>
        <p id="plan" class="muted">…</p>
      </details>

      <details open><summary><strong>SQL</strong></summary>
        <pre id="sql">…</pre>
      </details>

      <details open><summary><strong>Result</strong> <small id="row-count" class="muted"></small></summary>
        <div id="result">…</div>
      </details>

      <details open><summary><strong>Answer</strong></summary>
        <p id="answer">…</p>
      </details>

      <hr>
      <p class="muted" id="meta"></p>
    </article>

    <article id="error" hidden class="err">
      <h3>Error</h3>
      <p id="error-msg"></p>
    </article>
  </main>

  <script>
    const $ = (id) => document.getElementById(id);
    const form = $('ask-form');
    const input = $('question');
    const btn = $('submit-btn');
    const statusEl = $('status');
    const statusText = $('status-text');
    const responseEl = $('response');
    const errorEl = $('error');
    let currentSource = null;

    const NEXT_AFTER = {
      plan: 'Generating SQL…',
      synthesize: 'Executing SQL…',
      execute: 'Writing answer…',
      summarize: '',
    };

    document.querySelectorAll('.examples button').forEach(b => {
      b.addEventListener('click', () => { input.value = b.dataset.q; input.focus(); });
    });

    function resetUI() {
      $('plan').textContent = '…';
      $('sql').textContent = '…';
      $('result').innerHTML = '…';
      $('row-count').textContent = '';
      $('answer').textContent = '…';
      $('meta').innerHTML = '';
      responseEl.hidden = false;
      errorEl.hidden = true;
    }

    function renderTable(columns, rows) {
      if (!columns || !columns.length || !rows || !rows.length) return '<p class="muted">(no rows)</p>';
      const head = columns.map(c => `<th>${c}</th>`).join('');
      const body = rows.slice(0, 200).map(r => '<tr>' + r.map(v => `<td>${v ?? '<em class="muted">null</em>'}</td>`).join('') + '</tr>').join('');
      const note = rows.length > 200 ? `<p class="muted">(showing 200 of ${rows.length} rows)</p>` : '';
      return `<figure><table><thead><tr>${head}</tr></thead><tbody>${body}</tbody></table></figure>${note}`;
    }

    function showError(msg) {
      $('error-msg').textContent = msg || 'Unknown error';
      errorEl.hidden = false;
      statusEl.hidden = true;
    }

    function setStatus(text) {
      if (!text) { statusEl.hidden = true; return; }
      statusText.textContent = text;
      statusEl.hidden = false;
    }

    function handleEvent(ev) {
      if (ev.type === 'error') { showError(ev.message); return; }

      if (ev.type === 'done') {
        const bits = [
          `$${(ev.total_cost ?? 0).toFixed(4)}`,
          `${(ev.total_latency_sec ?? 0).toFixed(2)}s`,
          `${ev.input_tokens ?? 0}→${ev.output_tokens ?? 0} tok`,
        ];
        if (ev.retry_count) bits.push(`${ev.retry_count} retry`);
        if (ev.error) bits.push(`<span class="err">${ev.category}: ${ev.error}</span>`);
        $('meta').innerHTML = bits.join(' · ');
        setStatus('');
        return;
      }

      const data = ev.data || {};
      switch (ev.node) {
        case 'plan':
          if (data.plan) $('plan').textContent = data.plan;
          break;
        case 'synthesize':
          if (data.sql) $('sql').textContent = data.sql;
          else if (data.error) $('sql').textContent = `(synthesis failed: ${data.error})`;
          break;
        case 'execute':
          if (data.result_columns && data.result_rows) {
            $('result').innerHTML = renderTable(data.result_columns, data.result_rows);
            $('row-count').textContent = `(${data.result_rows.length} row${data.result_rows.length === 1 ? '' : 's'})`;
          } else if (data.error) {
            $('result').innerHTML = `<p class="err">SQL error: ${data.error}. Retrying…</p>`;
          }
          break;
        case 'summarize':
          if (data.final_answer) $('answer').textContent = data.final_answer;
          break;
      }
      if (ev.node && NEXT_AFTER[ev.node] !== undefined) setStatus(NEXT_AFTER[ev.node]);
    }

    form.addEventListener('submit', (e) => {
      e.preventDefault();
      const question = input.value.trim();
      if (!question) return;

      if (currentSource) currentSource.close();
      btn.setAttribute('aria-busy', 'true');
      btn.disabled = true;
      resetUI();
      setStatus('Planning…');

      const url = `/api/ask/stream?question=${encodeURIComponent(question)}`;
      const es = new EventSource(url);
      currentSource = es;

      es.onmessage = (e) => {
        try { handleEvent(JSON.parse(e.data)); }
        catch (err) { console.error('bad SSE event', e.data, err); }
      };

      es.onerror = () => {
        // EventSource auto-retries by default; close it on first error so we don't loop.
        es.close();
        btn.removeAttribute('aria-busy');
        btn.disabled = false;
        // Only show generic error if we haven't already shown one
        if (errorEl.hidden) showError('Connection lost. The request may still be running on the server. Try again.');
      };

      // 'done' or 'error' from the server are normal stream-end signals — close cleanly.
      const origHandle = handleEvent;
      // (we don't actually need to wrap — server closes the stream itself after 'done')

      // Detect normal close by listening for the 'done' event in handleEvent above,
      // and clean up button state once we see one:
      const origOnMessage = es.onmessage;
      es.onmessage = (e) => {
        origOnMessage(e);
        try {
          const parsed = JSON.parse(e.data);
          if (parsed.type === 'done' || parsed.type === 'error') {
            es.close();
            btn.removeAttribute('aria-busy');
            btn.disabled = false;
          }
        } catch {}
      };
    });
  </script>
</body>
</html>
